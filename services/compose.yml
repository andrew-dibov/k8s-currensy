services:
  api-gateway:
    container_name: "api-gateway"
    restart: "unless-stopped"
    build:
      dockerfile: "Dockerfile.dev"
      context: "./api-gateway"
    depends_on:
      currency:
        condition: "service_healthy"
      conversion:
        condition: "service_healthy"
    ports:
      - "8080:8080"
    networks:
      - "development-net"
    environment:
      PORT: "8080"
      API_KEYS: "test-1111,test-2222,test-3333,test-4444"
      CURRENCY_SERVICE: "currency:8081"
      CONVERSION_SERVICE: "conversion:8082"
      HISTORY_SERVICE: "history:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  currency:
    container_name: "currency"
    restart: "unless-stopped"
    build:
      dockerfile: "Dockerfile.dev"
      context: "./currency"
    ports:
      - "8081:8081"
    networks:
      - "development-net"
    depends_on:
      postgres:
        condition: "service_healthy"
    environment:
      PORT: "8081"
      EXTERNAL_API: "https://v6.exchangerate-api.com/v6/"
      POSTGRES_DB: "postgres://currency:pass1234@postgres:5432/currency?sslmode=disable"
    env_file:
      - ".env"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8081"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres:
    image: "postgres:15"
    container_name: "postgres"
    restart: "unless-stopped"
    ports:
      - "5432:5432"
    networks:
      - "development-net"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
      - "./currency/migrations:/docker-entrypoint-initdb.d"
    environment:
      POSTGRES_DB: "currency"
      POSTGRES_USER: "currency"
      POSTGRES_PASSWORD: "pass1234"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U currency"]
      interval: 10s
      timeout: 5s
      retries: 5
  conversion:
    container_name: "conversion"
    restart: "unless-stopped"
    build:
      dockerfile: "Dockerfile.dev"
      context: "./conversion"
    ports:
      - "8082:8082"
    networks:
      - "development-net"
    depends_on:
      currency:
        condition: "service_healthy"
      redis:
        condition: "service_healthy"
    environment:
      PORT: "8082"
      CURRENCY_SERVICE: "currency:8081"
      REDIS_DB: "redis:6379"
      REDIS_PASS: "pass1234"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8082"]
      interval: 10s
      timeout: 5s
      retries: 5  
  redis:
    image: "redis:7-alpine"
    container_name: "redis"
    restart: "unless-stopped"
    command: "redis-server --requirepass pass1234"
    ports:
      - "6379:6379"
    networks:
      - "development-net"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pass1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  development-net:
    driver: "bridge"

volumes:
  postgres_data: