services:

  api-gateway:
    container_name: api-gateway
    build:
      dockerfile: Dockerfile
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      API_KEYS: "test-1111,test-2222"
      HISTORY_SERVICE: "history:50051"
      CURRENCY_SERVICE: "currency:50051"
      CONVERSION_SERVICE: "conversion:50051"
    depends_on:
      currency:
        condition: service_healthy
    networks:
      - dev-net

  currency:
    container_name: currency
    build:
      dockerfile: Dockerfile
      context: ./currency
    ports:
      - "50051:50051"
    environment:
      PORT: "50051"
      API: "https://v6.exchangerate-api.com/v6/"
      POSTGRES_URL: "postgres://currency:pass1234@postgres:5432/currency?sslmode=disable"
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - dev-net

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: "currency"
      POSTGRES_USER: "currency"
      POSTGRES_PASSWORD: "pass1234"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./currency/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U currency"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge

volumes:
  postgres_data: